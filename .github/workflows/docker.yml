name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build das imagens
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helpdesk-api:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helpdesk-api:${{ github.sha }} .

      - name: Push das imagens
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/helpdesk-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/helpdesk-api:${{ github.sha }}